# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration file names; The default combo is a reasonable baseline.
# file_template = %%(rev)s_%%(slug)s

# sys.path path, required to find the models and database helper modules
prepend_sys_path = .

# timezone to use when rendering the date within the migration file as well as the filename.
# timezone =

# max length of characters to clone to slug.  Defaults to 40.
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be written to during
# revision generation
# write_hook_up_to_date = false

# sqlalchemy.url = postgresql://postgres:password@localhost:5432/knowledge_hub

[post_write_hooks]

[logging]
default_handler = console

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
